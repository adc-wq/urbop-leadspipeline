<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URBOP — Pipeline Comercial 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Sora',Arial,sans-serif;background:#f5f5f3;color:#111;font-size:13px;}
.wrapper{max-width:1100px;margin:0 auto;background:#fff;min-height:100vh;}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 32px;border-bottom:0.5px solid #e5e5e5;}
.brand{font-size:13px;font-weight:600;letter-spacing:0.06em;color:#111;}
.brand span{font-weight:400;color:#8a8b88;margin-left:8px;font-size:12px;}
.topbar-right{display:flex;align-items:center;gap:16px;}
.updated{font-size:11px;color:#8a8b88;}
.updated b{color:#111;font-weight:500;}

.tabs{display:flex;border-bottom:1.5px solid #e5e5e5;padding:0 32px;}
.tab{padding:11px 20px;font-size:12px;font-weight:400;color:#8a8b88;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1.5px;white-space:nowrap;transition:color .15s;font-family:'Sora',Arial,sans-serif;}
.tab:hover{color:#111;}
.tab.active{color:#111;font-weight:500;border-bottom:2px solid #111;}

.page{display:none;padding:28px 32px 48px;}
.page.active{display:block;}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 32px;gap:16px;}
.spinner{width:28px;height:28px;border:2px solid #e5e5e5;border-top-color:#111;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading p{font-size:12px;color:#8a8b88;}
.error-box{background:#fef2f2;border:0.5px solid #fecaca;border-radius:8px;padding:20px 24px;margin:24px 0;}
.error-box p{font-size:13px;color:#991b1b;line-height:1.7;}

.slabel{font-size:10px;font-weight:500;letter-spacing:0.1em;color:#8a8b88;text-transform:uppercase;margin-bottom:16px;}

.kgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px;}
.kcard{background:#f8f8f8;border-radius:8px;padding:14px 16px;}
.klabel{font-size:10px;color:#8a8b88;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;}
.kval{font-size:28px;font-weight:500;line-height:1;margin-bottom:4px;color:#111;}
.kval.g{color:#1a7a4a;}.kval.a{color:#b45309;}.kval.r{color:#c0392b;}.kval.b{color:#2a78d6;}
.ksub{font-size:11px;color:#8a8b88;line-height:1.5;}

.twocol{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:22px;}
.threecol{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:22px;}
.card{border:0.5px solid #e5e5e5;border-radius:8px;padding:16px 18px;}
.ctitle{font-size:10px;font-weight:500;letter-spacing:0.1em;color:#8a8b88;text-transform:uppercase;margin-bottom:12px;}

.legend{display:flex;gap:16px;font-size:11px;color:#8a8b88;margin-bottom:10px;flex-wrap:wrap;}
.ldot{width:8px;height:8px;border-radius:2px;display:inline-block;margin-right:4px;vertical-align:1px;}

.tbl{width:100%;border-collapse:collapse;font-size:12px;}
.tbl th{font-size:10px;font-weight:500;letter-spacing:0.07em;color:#8a8b88;text-transform:uppercase;padding:0 8px 8px 0;border-bottom:0.5px solid #e5e5e5;text-align:left;}
.tbl td{padding:7px 8px 7px 0;border-bottom:0.5px solid #f0f0f0;color:#111;vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl td.m{color:#8a8b88;}
.tbl td.r{text-align:right;}
.tbl th.r{text-align:right;}

.tag{display:inline-block;font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;}
.tag-alto{background:#d1fae5;color:#065f46;}
.tag-pdef{background:#f1efe8;color:#555;}
.tag-medio{background:#dbeafe;color:#1e40af;}
.tag-bajo{background:#fef3c7;color:#92400e;}
.tag-pmedio{background:#dbeafe;color:#1e40af;}
.tag-ali{background:#e8e7e0;color:#5a5a52;}
.tag-won{background:#d1fae5;color:#065f46;}
.tag-opp{background:#dbeafe;color:#1e40af;}
.tag-lost{background:#fecaca;color:#991b1b;}
.tag-lead{background:#f0f0f0;color:#555;}
.tag-act{background:#d1fae5;color:#065f46;}
.tag-ent{background:#f1efe8;color:#555;}
.tag-neg{background:#dbeafe;color:#1e40af;}

.chart-wrap{position:relative;height:220px;}
.chart-wrap-sm{position:relative;height:180px;}
.chart-wrap-lg{position:relative;height:260px;}

.big-stat{text-align:center;padding:24px 16px;}
.big-num{font-size:42px;font-weight:500;line-height:1;margin-bottom:6px;}
.big-lbl{font-size:12px;color:#8a8b88;line-height:1.5;}
.q-btn{font-size:11px;font-family:'Sora',Arial,sans-serif;padding:4px 12px;border:0.5px solid #e5e5e5;border-radius:20px;background:#fff;color:#8a8b88;cursor:pointer;transition:all .15s;}
.q-btn.active{background:#111;color:#fff;border-color:#111;}
.sel-q{font-size:11px;font-family:'Sora',Arial,sans-serif;padding:4px 10px;border:0.5px solid #e5e5e5;border-radius:20px;background:#fff;color:#555;cursor:pointer;}
.ctitle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.ctitle-row .ctitle{margin-bottom:0;}

.canal-link{cursor:pointer;}
.canal-link:hover{text-decoration:underline;}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(17,17,17,0.4);z-index:50;align-items:center;justify-content:center;padding:24px;}
.modal-overlay.active{display:flex;}
.modal-box{background:#fff;border-radius:10px;max-width:560px;width:100%;max-height:78vh;display:flex;flex-direction:column;box-shadow:0 20px 50px rgba(0,0,0,0.25);}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:0.5px solid #e5e5e5;}
.modal-title{font-size:13px;font-weight:600;color:#111;}
.modal-sub{font-size:11px;color:#8a8b88;margin-top:2px;}
.modal-close{cursor:pointer;font-size:20px;color:#8a8b88;line-height:1;border:none;background:none;padding:4px 6px;font-family:'Sora',Arial,sans-serif;}
.modal-close:hover{color:#111;}
.modal-body{padding:8px 20px 20px;overflow-y:auto;}
</style>
</head>
<body>
<div class="wrapper">

<div class="topbar">
  <div class="brand">URBOP <span>/ Pipeline comercial 2026</span></div>
  <div class="topbar-right">
    <div class="updated">Última actualización: <b id="last-updated">cargando...</b></div>
    <div style="display:flex;gap:4px;" id="q-selector">
      <button class="q-btn active" onclick="setQ('todos',this)">Todos</button>

      <button class="q-btn" onclick="setQ('Q3',this)">Q3</button>
      <button class="q-btn" onclick="setQ('Q4',this)">Q4</button>
    </div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('origen',this)">Origen de leads</div>
  <div class="tab" onclick="showTab('trayecto',this)">Trayecto</div>
  <div class="tab" onclick="showTab('servicios',this)">Servicios</div>
  <div class="tab" onclick="showTab('resumen',this)">Resumen</div>

  <div class="spinner"></div>
  <p>Cargando datos desde Google Sheets...</p>

<div id="main-content" style="display:none;">

  <div class="page active" id="page-origen">
    <div id="origen-content"></div>
  </div>

  <!-- TRAYECTO -->

    <div id="trayecto-content"></div>
  </div>

  <div class="page" id="page-servicios">
    <div id="servicios-content"></div>
  </div>

  <!-- RESUMEN -->
  <div class="page" id="page-resumen">
    <div id="resumen-content"></div>
  </div>

</div>

<div class="modal-overlay" id="canalModal" onclick="if(event.target===this)closeCanalModal()">
  <div class="modal-box">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modalTitle">Canal</div>
        <div class="modal-sub" id="modalSub"></div>
      </div>
      <button class="modal-close" onclick="closeCanalModal()">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>

<script>
const URL_LEADS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTu5sghPNilCI6tyDV8xpCbloDpuzPFffJIDi3b4Ov8N4L3b3glHRDXWSdcDhcruWKT606Q_PnSyozp/pub?gid=1998433350&single=true&output=csv";
const URL_SERV  = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTu5sghPNilCI6tyDV8xpCbloDpuzPFffJIDi3b4Ov8N4L3b3glHRDXWSdcDhcruWKT606Q_PnSyozp/pub?gid=1157262922&single=true&output=csv";
const SHEET_ID  = "1YgMrLRENztZvkImnMh0Bz-LD46cYbxErKy8DzMWFCXY";

let allLeads=[], allServicios=[];
let charts={};
let rendered=new Set();
let activeQ='todos';
let oppTableQ='todos';

// ── COLORS ──────────────────────────────────────────────
const C = {
  alto:   '#1baf7a',
  medio:  '#2a78d6',
  bajo:   '#eda100',
  pdef:   '#eda100',
  ali:    '#c3c2b7',
  won:    '#1a7a4a',
  opp:    '#2a78d6',
  lost:   '#e34948',
  grid:   '#f0f0f0',
  lbl:    '#8a8b88',
  s: ['#2a78d6','#1baf7a','#eda100','#4a3aa7','#e34948','#898781','#c3c2b7','#eb6834'],
};

// ── CSV PARSER ──────────────────────────────────────────
function parseCSVLine(line){
  const res=[]; let cur='', inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){inQ=!inQ;}
    else if(c===','&&!inQ){res.push(cur.trim());cur='';}
    else{cur+=c;}
  }
  res.push(cur.trim());
  return res;
}

function csvToObjects(text){
  const lines=text.trim().split('\n');
  let hi=0;
  for(let i=0;i<Math.min(5,lines.length);i++){
    const first=parseCSVLine(lines[i])[0].replace(/"/g,'').trim();
    if(first==='Nombre'||first==='Cliente'){hi=i;break;}
  }
  const headers=parseCSVLine(lines[hi]).map(h=>h.replace(/"/g,'').trim());
  return lines.slice(hi+1).map(line=>{
    const vals=parseCSVLine(line);
    const obj={};
    headers.forEach((h,i)=>{obj[h]=(vals[i]||'').replace(/"/g,'').trim();});
    return obj;
  }).filter(r=>r['Nombre']||r['Cliente']);
}

// ── UTILS ───────────────────────────────────────────────
function pct(n,d){return d===0?'0%':(n/d*100).toFixed(1)+'%';}
function pctN(n,d){return d===0?0:Math.round(n/d*100);}
function destroyChart(id){if(charts[id]){charts[id].destroy();delete charts[id];}}
function escJS(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

function calidadTag(c){
  if(c==='Alto potencial')return'tag-alto';
  if(c==='Potencial medio')return'tag-medio';
  if(c==='Potencial bajo')return'tag-bajo';
  if(c==='Alianza estratégica')return'tag-ali';
  return'tag-pdef';
}
function estadoTag(e){
  if(e==='Won')return'tag-won';
  if(e==='Oportunidad')return'tag-opp';
  if(e==='Lost')return'tag-lost';
  return'tag-lead';
}

function buildBar(id,labels,datasets,opts={}){
  destroyChart(id);
  const ctx=document.getElementById(id);
  if(!ctx)return;
  charts[id]=new Chart(ctx,{
    type:'bar',
    data:{labels,datasets},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},...(opts.legend||{})},
      scales:{
        x:{stacked:opts.stacked||false,grid:{display:false},ticks:{font:{size:11,family:'Sora'},color:C.lbl}},
        y:{stacked:opts.stacked||false,grid:{color:C.grid},ticks:{font:{size:11,family:'Sora'},color:C.lbl},beginAtZero:true,...(opts.y||{})}
      },...(opts.extra||{})
    }
  });
}

function buildHBar(id,labels,data,color,opts={}){
  destroyChart(id);
  const ctx=document.getElementById(id);
  if(!ctx)return;
  charts[id]=new Chart(ctx,{
    type:'bar',
    data:{labels,datasets:[{data,backgroundColor:color,borderRadius:3,borderSkipped:false}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{grid:{color:C.grid},ticks:{font:{size:11,family:'Sora'},color:C.lbl,...(opts.xticks||{})}},
        y:{grid:{display:false},ticks:{font:{size:11,family:'Sora'},color:C.lbl}}
      }
    }
  });
}

function buildDoughnut(id,data,labels,colors){
  destroyChart(id);
  const ctx=document.getElementById(id);
  if(!ctx)return;
  charts[id]=new Chart(ctx,{
    type:'doughnut',
    data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:2,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'right',labels:{font:{size:11,family:'Sora'},color:C.lbl,boxWidth:10,padding:8}}}
    }
  });
}

// ── CANAL MODAL ──────────────────────────────────────────
function showCanalModal(canal){
  const leadsSrc=activeQ==='todos'?allLeads:allLeads.filter(r=>r['Q']===activeQ);
  const rows=leadsSrc.filter(r=>(r['Origen']||'Sin registrar')===canal);
  document.getElementById('modalTitle').textContent=canal;
  document.getElementById('modalSub').textContent=`${rows.length} lead${rows.length===1?'':'s'}${activeQ!=='todos'?' · '+activeQ:''}`;
  document.getElementById('modalBody').innerHTML=`
    <table class="tbl">
      <thead><tr><th>Lead</th><th>Calidad</th><th>Estado</th><th>Q</th></tr></thead>
      <tbody>
        ${rows.map(r=>`
        <tr>
          <td style="font-weight:500">${r['Nombre']}</td>
          <td><span class="tag ${calidadTag(r['Calidad'])}">${r['Calidad']||'Por definir'}</span></td>
          <td><span class="tag ${estadoTag(r['Estado'])}">${r['Estado']||'—'}</span></td>
          <td class="m">${r['Q']||'—'}</td>
        </tr>`).join('')||'<tr><td colspan="4" class="m">Sin leads.</td></tr>'}
      </tbody>
    </table>`;
  document.getElementById('canalModal').classList.add('active');
}
function closeCanalModal(){
  document.getElementById('canalModal').classList.remove('active');
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeCanalModal();});

// ── STATS ───────────────────────────────────────────────
function getLeadStats(){
  const leads=activeQ==='todos'?allLeads:allLeads.filter(r=>r['Q']===activeQ);
  const total=leads.length;
  const won=leads.filter(r=>r['Estado']==='Won').length;
  const opp=leads.filter(r=>r['Estado']==='Oportunidad').length;
  const lost=leads.filter(r=>r['Estado']==='Lost').length;
  const alto=leads.filter(r=>r['Calidad']==='Alto potencial').length;
  const medio=leads.filter(r=>r['Calidad']==='Potencial medio').length;
  const bajo=leads.filter(r=>r['Calidad']==='Potencial bajo').length;
  const pdef=allLeads.filter(r=>r['Calidad']==='Por definir').length;
  const ali=leads.filter(r=>r['Calidad']==='Alianza estratégica').length;

  const byOrigen={};
  leads.forEach(r=>{
    const o=r['Origen']||'Sin registrar';
    if(!byOrigen[o]) byOrigen[o]={total:0,alto:0,medio:0,bajo:0,pdef:0,ali:0,won:0,opp:0,lost:0};
    byOrigen[o].total++;
    if(r['Calidad']==='Alto potencial') byOrigen[o].alto++;
    else if(r['Calidad']==='Potencial medio') byOrigen[o].medio++;
    else if(r['Calidad']==='Potencial bajo') byOrigen[o].bajo++;
    else if(r['Calidad']==='Alianza estratégica') byOrigen[o].ali++;
    else byOrigen[o].pdef++;
    if(r['Estado']==='Won') byOrigen[o].won++;
    else if(r['Estado']==='Oportunidad') byOrigen[o].opp++;
    else if(r['Estado']==='Lost') byOrigen[o].lost++;
  });

  const lostReasons={};
  leads.filter(r=>r['Estado']==='Lost').forEach(r=>{
    const rz=r['Razón lost']||'Sin registrar';
    lostReasons[rz]=(lostReasons[rz]||0)+1;
  });

  // By calidad + estado
  const altoWon=leads.filter(r=>r['Calidad']==='Alto potencial'&&r['Estado']==='Won').length;
  const altoOpp=leads.filter(r=>r['Calidad']==='Alto potencial'&&r['Estado']==='Oportunidad').length;
  const altoLost=leads.filter(r=>r['Calidad']==='Alto potencial'&&r['Estado']==='Lost').length;
  const pdefWon=leads.filter(r=>r['Calidad']==='Por definir'&&r['Estado']==='Won').length;
  const pdefOpp=leads.filter(r=>r['Calidad']==='Por definir'&&r['Estado']==='Oportunidad').length;
  const pdefLost=leads.filter(r=>r['Calidad']==='Por definir'&&r['Estado']==='Lost').length;

  return{total,won,opp,lost,alto,pdef,ali,byOrigen,lostReasons,
    altoWon,altoOpp,altoLost,pdefWon,pdefOpp,pdefLost};
}

function getSvcStats(){
  const svcs=activeQ==='todos'?allServicios:allServicios.filter(r=>r['Q']===activeQ);
  const activos=svcs.filter(r=>r['Estado']==='Activo');
  const entregados=svcs.filter(r=>r['Estado']==='Entregado');
  const negociacion=svcs.filter(r=>r['Estado']==='En negociación');
  const bySvc={};
  svcs.forEach(r=>{
    const s=r['Servicio']||'Sin definir';
    bySvc[s]=(bySvc[s]||0)+1;
  });
  return{activos,entregados,negociacion,bySvc,total:svcs.length};
}

// ── RENDER ORIGEN ────────────────────────────────────────
function renderOrigen(){
  const s=getLeadStats();
  const origenes=Object.entries(s.byOrigen).sort((a,b)=>b[1].total-a[1].total);
  const labels=origenes.map(([o])=>o);
  const altoData=origenes.map(([,v])=>v.alto);
  const medioData=origenes.map(([,v])=>v.medio||0);
  const bajoData=origenes.map(([,v])=>v.bajo||0);
  const aliData=origenes.map(([,v])=>v.ali);
  const wonPct=origenes.map(([,v])=>v.total>0?Math.round(v.won/v.total*100):0);

  document.getElementById('origen-content').innerHTML=`
  <div class="slabel">¿De dónde vienen los leads y qué calidad tienen?</div>
  <div class="twocol">
    <div class="card">
      <div class="ctitle">Volumen y calidad por canal</div>
      <div class="legend">
        <span><span class="ldot" style="background:${C.alto}"></span>Alto potencial</span>
        <span><span class="ldot" style="background:${C.medio}"></span>Potencial medio</span>
        <span><span class="ldot" style="background:${C.bajo}"></span>Potencial bajo</span>
        <span><span class="ldot" style="background:${C.ali}"></span>Alianza estratégica</span>
      </div>
      <div class="chart-wrap-lg"><canvas id="origenVolChart" role="img" aria-label="Barras apiladas de calidad por canal"></canvas></div>
    </div>
    <div class="card">
      <div class="ctitle">Tasa de conversión a Won por canal</div>
      <div class="chart-wrap-lg"><canvas id="origenWonChart" role="img" aria-label="Barras horizontales de conversión a won por canal"></canvas></div>
      
    </div>
  </div>
  <div class="card">
    <div class="ctitle">Detalle por canal</div>
    <table class="tbl">
      <thead><tr><th>Canal</th><th class="r">Leads</th><th class="r">Alto potencial</th><th class="r">Won</th><th class="r">% Won</th><th class="r">Opp activas</th></tr></thead>
      <tbody>
        ${origenes.map(([o,v])=>`
        <tr>
          <td style="font-weight:500" class="canal-link" onclick="showCanalModal('${escJS(o)}')">${o}</td>
          <td class="r">${v.total}</td>
          <td class="r">${v.alto>0?`<span class="tag tag-alto">${v.alto}</span>`:'—'}</td>
          <td class="r" style="color:#1a7a4a;font-weight:500">${v.won||'—'}</td>
          <td class="r">${v.total>0?Math.round(v.won/v.total*100)+'%':'—'}</td>
          <td class="r">${v.opp||'—'}</td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>`;

  setTimeout(()=>{
    buildBar('origenVolChart', labels,
      [
        {label:'Alto potencial',data:altoData,backgroundColor:C.alto,borderRadius:3,borderSkipped:false},
        {label:'Potencial medio',data:medioData,backgroundColor:C.medio,borderRadius:3,borderSkipped:false},
        {label:'Potencial bajo',data:bajoData,backgroundColor:C.bajo,borderRadius:3,borderSkipped:false},
        {label:'Alianza estratégica',data:aliData,backgroundColor:C.ali,borderRadius:3,borderSkipped:false},
      ],{stacked:true}
    );
    buildHBar('origenWonChart', labels, wonPct, C.opp, {xticks:{callback:v=>v+'%'}});
  },50);
}

// ── RENDER TRAYECTO ──────────────────────────────────────
function renderOppTable(){
  const sel=document.getElementById('oppQFilter');
  const q=sel?sel.value:oppTableQ;
  oppTableQ=q;
  const rows=allLeads.filter(r=>r['Estado']==='Oportunidad'&&(q==='todos'||r['Q']===q));
  const tbody=document.getElementById('oppTableBody');
  if(!tbody)return;
  tbody.innerHTML=rows.length?rows.map(r=>`
    <tr>
      <td style="font-weight:500">${r['Nombre']}</td>
      <td class="m">${r['Origen']||'—'}</td>
      <td><span class="tag ${calidadTag(r['Calidad'])}">${r['Calidad']||'Por definir'}</span></td>
      <td class="m">${r['Q']||'—'}</td>
    </tr>`).join(''):`<tr><td colspan="4" class="m">Sin oportunidades activas${q!=='todos'?' en '+q:''}.</td></tr>`;
}

// ── RENDER RESUMEN ───────────────────────────────────────
function renderResumen(){
  const savedQ=activeQ;
  activeQ='todos';
  const ls=getLeadStats();
  const ss=getSvcStats();
  const byQ=['Q1','Q2','Q3','Q4'].map(q=>{
    activeQ=q;
    const l=getLeadStats();
    const sv=getSvcStats();
    return{q,leads:l.total,won:l.won,opp:l.opp,lost:l.lost,entregados:sv.entregados.length,activos:sv.activos.length};
  });
  activeQ=savedQ;
  const reactivables=allLeads.filter(r=>r['Estado']==='Lost'&&(r['Razón lost']==='No es el momento'||r['Razón lost']==='Sin respuesta / No responde')).length;
  const topCanal=Object.entries(ls.byOrigen).sort((a,b)=>{
    const pa=a[1].total>0?b[1].won/b[1].total:0;
    const pb=b[1].total>0?b[1].won/b[1].total:0;
    return pb-pa;
  })[0]?.[0]||'—';

  document.getElementById('resumen-content').innerHTML=`
  <div class="slabel">Resumen ejecutivo — 2026</div>
  <div class="kgrid">
    <div class="kcard"><div class="klabel">Leads generados</div><div class="kval">${ls.total}</div><div class="ksub">Meta anual 228 · ${pct(ls.total,228)}</div></div>
    <div class="kcard"><div class="klabel">Won</div><div class="kval g">${ls.won}</div><div class="ksub">Meta anual 56 · ${pct(ls.won,56)}</div></div>
    <div class="kcard"><div class="klabel">Proyectos entregados</div><div class="kval g">${ss.entregados.length}</div><div class="ksub">2026</div></div>
    <div class="kcard"><div class="klabel">Proyectos activos</div><div class="kval b">${ss.activos.length}</div><div class="ksub">En ejecución ahora</div></div>
  </div>
  <div class="threecol">
    <div class="card big-stat">
      <div class="big-num" style="color:#1a7a4a;">${pct(ls.won,ls.total)}</div>
      <div class="big-lbl">de leads llegaron a Won</div>
    </div>
    <div class="card big-stat">
      <div class="big-num" style="color:#b45309;">${reactivables}</div>
      <div class="big-lbl">leads reactivables en H2<br>("no es el momento")</div>
    </div>
    <div class="card big-stat">
      <div class="big-num" style="color:#2a78d6;">${ls.alto}</div>
      <div class="big-lbl">leads de alto potencial<br>${pct(ls.alto,ls.total)} del total</div>
    </div>
  </div>
  <div class="card">
    <div class="ctitle">Detalle por trimestre</div>
    <table class="tbl">
      <thead><tr><th>Q</th><th class="r">Leads</th><th class="r">Won</th><th class="r">Oportunidad</th><th class="r">Lost</th><th class="r">Entregados</th><th class="r">Activos</th></tr></thead>
      <tbody>
        ${byQ.map(r=>`
        <tr>
          <td style="font-weight:500">${r.q}</td>
          <td class="r">${r.leads}</td>
          <td class="r" style="color:#1a7a4a;font-weight:500">${r.won}</td>
          <td class="r" style="color:#b45309">${r.opp}</td>
          <td class="r" style="color:#c0392b">${r.lost}</td>
          <td class="r">${r.entregados}</td>
          <td class="r">${r.activos}</td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>
  `;
}

// ── Q FILTER ────────────────────────────────────────────
function setQ(q, btn){
  activeQ=q;
  document.querySelectorAll('.q-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  rendered.clear();
  Object.values(charts).forEach(c=>c.destroy());
  charts={};
  const activeTab=document.querySelector('.tab.active');
  const tabId=activeTab?.getAttribute('onclick')?.match(/'(\w+)'/)?.[1]||'origen';
  if(tabId==='origen')renderOrigen();
  else if(tabId==='trayecto')renderTrayecto();
  else if(tabId==='servicios')renderServicios();
  else if(tabId==='resumen')renderResumen();
  rendered.add(tabId);
}

// ── NAV ─────────────────────────────────────────────────
function showTab(id,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  if(el)el.classList.add('active');
  if(!rendered.has(id)){
    if(id==='origen')renderOrigen();
    else if(id==='trayecto')renderTrayecto();
    else if(id==='servicios')renderServicios();
    else if(id==='resumen')renderResumen();
    rendered.add(id);
  }
}

// ── INIT ────────────────────────────────────────────────
async function init(){
  try{
    const [leadsCSV,serviciosCSV]=await Promise.all([
      fetch(URL_LEADS).then(r=>{if(!r.ok)throw new Error(`HTTP ${r.status}`);return r.text();}),
      fetch(URL_SERV).then(r=>{if(!r.ok)throw new Error(`HTTP ${r.status}`);return r.text();})
    ]);
    allLeads=csvToObjects(leadsCSV);
    allServicios=csvToObjects(serviciosCSV);

    try{
      const dr=await fetch(`https://www.googleapis.com/drive/v3/files/${SHEET_ID}?fields=modifiedTime`);
      if(dr.ok){
        const dd=await dr.json();
        const d=new Date(dd.modifiedTime);
        const months=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
        document.getElementById('last-updated').textContent=`${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}, ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
      } else throw new Error();
    } catch{
      const d=new Date();
      const months=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
      document.getElementById('last-updated').textContent=`${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
    }

    document.getElementById('main-loading').style.display='none';
    document.getElementById('main-content').style.display='block';
    renderOrigen();
    rendered.add('origen');
  } catch(err){
    document.getElementById('main-loading').innerHTML=`<div class="error-box"><p><b>No se pudo cargar el Google Sheets.</b><br>Asegúrate de que el archivo esté publicado en la web.<br><br>Error: ${err.message}</p></div>`;
  }
}

init();
</script>
